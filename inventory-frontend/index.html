<!DOCTYPE html>
<html>
<head>
    <title>Inventory App</title>
</head>
<body>

<h2>Login</h2>
<input id="username" placeholder="username">
<input id="password" placeholder="password" type="password">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>


<p id="status"></p>

<div id="productSection">
    <h2>Products</h2>

    <div id="adminControls">
        <h3>Create Product</h3>
        <input id="name" placeholder="Name">
        <input id="price" placeholder="Price" type="number">
        <input id="quantity" placeholder="Quantity" type="number">
        <button onclick="createProduct()">Create</button>
    </div>

    <button onclick="getProducts()">Load Products</button>
    <ul id="products"></ul>
</div>

<script>
    let token = localStorage.getItem("token") || "";

    if (token) {
        document.getElementById("status").innerText = "Already logged in";
    } else {
        document.getElementById("status").innerText = "Logged out";
    }

    updateUIForRole();

    // LOGIN
    async function login() {
        const res = await fetch("https://inventory-management-api-4lge.onrender.com/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: document.getElementById("username").value,
                password: document.getElementById("password").value
            })
        });

        const data = await res.json();

        if (data.token) {
            token = data.token;
            localStorage.setItem("token", token);
            document.getElementById("status").innerText = "Logged in";
            console.log("Token:", token);

            updateUIForRole();
            getProducts();
        }
    }

    function logout() {
        localStorage.removeItem("token");
        token = "";
        document.getElementById("status").innerText = "Logged out";


        document.getElementById("products").innerHTML = "";
    }

    // GET PRODUCTS
    async function getProducts() {
        const res = await fetch("https://inventory-management-api-4lge.onrender.com/products", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (res.status === 401 || res.status === 403) {
            alert("Unauthorized");
            return;
        }

        const data = await res.json();

        const list = document.getElementById("products");
        list.innerHTML = "";

        const role = getRoleFromToken();

        data.forEach(p => {
            const li = document.createElement("li");

            let deleteButton = "";

            if (role === "ROLE_ADMIN") {
                deleteButton = `<button onclick="deleteProduct(${p.id})">Delete</button>`;
            }

            li.innerHTML = `
                <strong>${p.name}</strong><br>
                ID: ${p.id}<br>
                Price: $${p.price}<br>
                Quantity: ${p.quantity}<br>
                ${deleteButton}
                <hr>
            `;

            list.appendChild(li);
        });
    }

    async function createProduct() {
        const res = await fetch("https://inventory-management-api-4lge.onrender.com/products", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                name: document.getElementById("name").value,
                price: parseFloat(document.getElementById("price").value),
                quantity: parseInt(document.getElementById("quantity").value)
            })
        });

        if (res.ok) {
            alert("Product created");
            getProducts(); // refresh list
        } else {
            alert("Failed to create");
        }
    }

    async function deleteProduct(id) {
        const res = await fetch(`https://inventory-management-api-4lge.onrender.com/products/${id}`, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (res.ok) {
            alert("Deleted");
            getProducts();
        } else {
            alert("Delete failed");
        }
    }

    function getRoleFromToken() {
        if (!token) return null;

        const payload = JSON.parse(atob(token.split('.')[1]));
        return payload.role;
    }

    function updateUIForRole() {
        const role = getRoleFromToken();
        const controls = document.getElementById("adminControls");

        if (role === "ROLE_ADMIN") {
            controls.style.display = "block";
        } else {
            controls.style.display = "none";
        }
    }
</script>

</body>
</html>
