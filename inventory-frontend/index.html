<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Inventory Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
          rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<header>
    <div class="brand">⬡ Inventory Manager</div>
    <div class="nav-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="status">Not signed in</span>
    </div>
</header>

<main>

    <!-- AUTH CARD -->
    <div class="card">
        <div class="card-title">Authentication</div>

        <div class="tabs">
            <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
            <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
        </div>

        <!-- LOGIN PANEL -->
        <div class="tab-panel active" id="panel-login">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input autocomplete="username" id="username" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input autocomplete="current-password" id="password" placeholder="Enter password" type="password">
                </div>
                <div style="display:flex;gap:0.5rem;">
                    <button class="btn-primary" onclick="login()">Sign In</button>
                    <button class="btn-ghost" onclick="logout()">Sign Out</button>
                </div>
            </div>
        </div>

        <!-- REGISTER PANEL -->
        <div class="tab-panel" id="panel-register">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input id="reg-username" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input id="reg-password" placeholder="Choose a password" type="password">
                </div>
                <div>
                    <button class="btn-primary" onclick="register()">Create Account</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN: CREATE PRODUCT -->
    <div class="card" id="adminControls" style="display:none;">
        <div class="card-title">Create Product <span class="admin-badge">Admin</span></div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Name</label>
                <input id="name" placeholder="Product name">
            </div>
            <div class="form-group">
                <label class="form-label">Price</label>
                <input id="price" placeholder="0.00" step="0.01" type="number">
            </div>
            <div class="form-group">
                <label class="form-label">Quantity</label>
                <input id="quantity" placeholder="0" type="number">
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select id="categoryId">
                    <option value="">Select category...</option>
                </select>
            </div>
            <div>
                <button class="btn-primary" onclick="createProduct()">Add Product</button>
            </div>
        </div>
    </div>

    <!-- PRODUCTS CARD -->
    <div class="card">
        <div class="product-header">
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <div class="card-title" style="margin:0;padding:0;border:none;">Products</div>
                <span class="product-count" id="productCount">0 items</span>
            </div>
            <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;">
                <div class="search-wrap">
                    <span class="search-icon">⌕</span>
                    <input id="searchInput" oninput="handleSearch(this.value)" placeholder="Search products...">
                </div>
                <button class="btn-secondary" onclick="getProducts()">↻ Refresh</button>
            </div>
        </div>
        <ul id="products">
            <div class="empty-state">
                <span>📦</span>
                Sign in and load products to get started
            </div>
        </ul>
    </div>

</main>

<div id="toast"></div>

<!-- Scripts: config must load first, then utils, then feature modules -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/categories.js"></script>
<script src="js/auth.js"></script>
<script src="js/products.js"></script>

<script>
    // Init — runs after all modules are loaded
    if (token) {
        setStatus(true);
        updateUIForRole();
        loadCategories();
        getProducts();
    }
</script>

</body>
</html>
