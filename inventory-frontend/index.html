<!DOCTYPE html>
<html>
<head>
    <title>Inventory Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
          rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --navy: #0f1c2e;
            --navy-mid: #162336;
            --navy-light: #1e3250;
            --border: #253d5b;
            --accent: #2e7df7;
            --accent-hover: #1a6be0;
            --accent-soft: rgba(46, 125, 247, 0.1);
            --text: #e8edf3;
            --text-muted: #7a92ae;
            --text-dim: #4a6580;
            --danger: #e05252;
            --danger-soft: rgba(224, 82, 82, 0.1);
            --success: #3ecf8e;
            --warning: #f5a623;
            --warning-soft: rgba(245, 166, 35, 0.1);
            --white: #ffffff;
            --input-bg: #0d1825;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--navy);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* TOP NAV */
        header {
            background: var(--navy-mid);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .nav-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-dim);
            transition: background 0.3s;
        }

        .status-dot.active {
            background: var(--success);
        }

        /* MAIN LAYOUT */
        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        /* AUTH TABS */
        .tabs {
            display: flex;
            gap: 0.25rem;
            margin-bottom: 1.25rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 0.25rem;
            width: fit-content;
        }

        .tab {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.35rem 1rem;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            background: transparent;
            color: var(--text-muted);
            transition: all 0.15s;
        }

        .tab.active {
            background: var(--navy-light);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* CARD */
        .card {
            background: var(--navy-mid);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.75rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .card-title {
            font-size: 0.7rem;
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* FORM */
        .form-row {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            flex: 1;
            min-width: 130px;
        }

        .form-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.05em;
        }

        input, select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            padding: 0.6rem 0.875rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        select option {
            background: var(--navy-mid);
        }

        input::placeholder {
            color: var(--text-dim);
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        /* SEARCH */
        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 180px;
        }

        .search-wrap input {
            padding-left: 2.25rem;
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            pointer-events: none;
            font-size: 0.9rem;
        }

        /* BUTTONS */
        button {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            padding: 0.6rem 1.25rem;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(46, 125, 247, 0.3);
        }

        .btn-secondary {
            background: var(--navy-light);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        .btn-warning {
            background: var(--warning-soft);
            color: var(--warning);
            border: 1px solid rgba(245, 166, 35, 0.2);
            padding: 0.35rem 0.75rem;
            font-size: 0.78rem;
        }

        .btn-warning:hover {
            background: var(--warning);
            color: var(--navy);
        }

        .btn-danger {
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid rgba(224, 82, 82, 0.2);
            padding: 0.35rem 0.75rem;
            font-size: 0.78rem;
        }

        .btn-danger:hover {
            background: var(--danger);
            color: var(--white);
        }

        .btn-success {
            background: rgba(62, 207, 142, 0.1);
            color: var(--success);
            border: 1px solid rgba(62, 207, 142, 0.2);
            padding: 0.35rem 0.75rem;
            font-size: 0.78rem;
        }

        .btn-success:hover {
            background: var(--success);
            color: var(--navy);
        }

        /* PRODUCT LIST */
        .product-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .product-header .card-title {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .product-count {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--navy-light);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        #products {
            list-style: none;
        }

        /* Each product is a wrapper with row + collapsible edit panel */
        .product-item {
            border-radius: 7px;
            border: 1px solid transparent;
            transition: border-color 0.15s;
            margin-bottom: 0.4rem;
            overflow: hidden;
        }

        .product-item:hover {
            border-color: var(--border);
        }

        .product-row {
            display: grid;
            grid-template-columns: 1fr auto auto auto auto auto;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1rem;
            transition: background 0.15s;
        }

        .product-item:hover .product-row {
            background: var(--navy-light);
        }

        .product-name {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text);
        }

        .product-id {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .product-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            text-align: right;
        }

        .product-price {
            color: var(--success);
            font-weight: 500;
        }

        .product-category {
            font-size: 0.72rem;
            background: var(--accent-soft);
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            border: 1px solid rgba(46, 125, 247, 0.2);
            white-space: nowrap;
        }

        /* INLINE EDIT PANEL */
        .edit-panel {
            display: none;
            background: var(--input-bg);
            border-top: 1px solid var(--border);
            padding: 1rem;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .edit-panel.open {
            display: flex;
        }

        .edit-panel input,
        .edit-panel select {
            font-size: 0.82rem;
            padding: 0.5rem 0.75rem;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-dim);
            font-size: 0.875rem;
        }

        .empty-state span {
            display: block;
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        /* ADMIN BADGE */
        .admin-badge {
            font-size: 0.68rem;
            font-family: 'DM Mono', monospace;
            background: var(--warning-soft);
            color: var(--warning);
            border: 1px solid rgba(245, 166, 35, 0.25);
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--navy-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1.25rem;
            font-size: 0.85rem;
            color: var(--text);
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.25s;
            pointer-events: none;
            z-index: 999;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        #toast.success {
            border-left: 3px solid var(--success);
        }

        #toast.error {
            border-left: 3px solid var(--danger);
        }

        #toast.info {
            border-left: 3px solid var(--accent);
        }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            .product-row {
                grid-template-columns: 1fr auto;
            }

            .product-meta, .product-category {
                display: none;
            }

            .form-row {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">⬡ Inventory Manager</div>
    <div class="nav-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="status">Not signed in</span>
    </div>
</header>

<main>

    <!-- AUTH CARD -->
    <div class="card">
        <div class="card-title">Authentication</div>

        <div class="tabs">
            <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
            <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
        </div>

        <!-- LOGIN PANEL -->
        <div class="tab-panel active" id="panel-login">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input autocomplete="username" id="username" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input autocomplete="current-password" id="password" placeholder="Enter password" type="password">
                </div>
                <div style="display:flex;gap:0.5rem;">
                    <button class="btn-primary" onclick="login()">Sign In</button>
                    <button class="btn-ghost" onclick="logout()">Sign Out</button>
                </div>
            </div>
        </div>

        <!-- REGISTER PANEL -->
        <div class="tab-panel" id="panel-register">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input id="reg-username" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input id="reg-password" placeholder="Choose a password" type="password">
                </div>
                <div>
                    <button class="btn-primary" onclick="register()">Create Account</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN: CREATE PRODUCT -->
    <div class="card" id="adminControls" style="display:none;">
        <div class="card-title">Create Product <span class="admin-badge">Admin</span></div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Name</label>
                <input id="name" placeholder="Product name">
            </div>
            <div class="form-group">
                <label class="form-label">Price</label>
                <input id="price" placeholder="0.00" step="0.01" type="number">
            </div>
            <div class="form-group">
                <label class="form-label">Quantity</label>
                <input id="quantity" placeholder="0" type="number">
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select id="categoryId">
                    <option value="">Select category...</option>
                </select>
            </div>
            <div>
                <button class="btn-primary" onclick="createProduct()">Add Product</button>
            </div>
        </div>
    </div>

    <!-- PRODUCTS CARD -->
    <div class="card">
        <div class="product-header">
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <div class="card-title" style="margin:0;padding:0;border:none;">Products</div>
                <span class="product-count" id="productCount">0 items</span>
            </div>
            <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;">
                <div class="search-wrap">
                    <span class="search-icon">⌕</span>
                    <input id="searchInput" oninput="handleSearch(this.value)" placeholder="Search products...">
                </div>
                <button class="btn-secondary" onclick="getProducts()">↻ Refresh</button>
            </div>
        </div>
        <ul id="products">
            <div class="empty-state">
                <span>📦</span>
                Sign in and load products to get started
            </div>
        </ul>
    </div>

</main>

<div id="toast"></div>

<script>
    const BASE_URL = "https://inventory-management-api-4lge.onrender.com";

    const formatCurrency = (value) =>
        new Intl.NumberFormat("en-US", {style: "currency", currency: "USD"}).format(value);

    let token = localStorage.getItem("token") || "";
    let allCategories = [];
    let searchTimeout = null;

    // ── INIT ──────────────────────────────────────────────
    if (token) {
        setStatus(true);
        updateUIForRole();
        loadCategories();
        getProducts();
    }

    // ── AUTH TABS ─────────────────────────────────────────
    function switchTab(tab) {
        ["login", "register"].forEach(t => {
            document.getElementById(`tab-${t}`).classList.toggle("active", t === tab);
            document.getElementById(`panel-${t}`).classList.toggle("active", t === tab);
        });
    }

    // ── TOAST ─────────────────────────────────────────────
    function showToast(msg, type = "success") {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.className = `show ${type}`;
        setTimeout(() => toast.className = "", 3000);
    }

    // ── STATUS ────────────────────────────────────────────
    function setStatus(loggedIn) {
        const dot = document.getElementById("statusDot");
        const status = document.getElementById("status");
        if (loggedIn) {
            dot.classList.add("active");
            const role = getRoleFromToken();
            status.textContent = role === "ROLE_ADMIN" ? "Signed in · Admin" : "Signed in";
        } else {
            dot.classList.remove("active");
            status.textContent = "Not signed in";
        }
    }

    // ── REGISTER ──────────────────────────────────────────
    async function register() {
        const username = document.getElementById("reg-username").value.trim();
        const password = document.getElementById("reg-password").value.trim();
        if (!username || !password) {
            showToast("Please fill in all fields", "error");
            return;
        }

        try {
            const res = await fetch(`${BASE_URL}/auth/register`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username, password})
            });

            if (res.ok) {
                showToast("Account created — you can now sign in");
                document.getElementById("reg-username").value = "";
                document.getElementById("reg-password").value = "";
                switchTab("login");
            } else {
                const text = await res.text();
                showToast(text || "Registration failed", "error");
            }
        } catch (e) {
            showToast("Registration failed", "error");
        }
    }

    // ── LOGIN ─────────────────────────────────────────────
    async function login() {
        try {
            const res = await fetch(`${BASE_URL}/auth/login`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    username: document.getElementById("username").value,
                    password: document.getElementById("password").value
                })
            });

            const data = await res.json();

            if (data.token) {
                token = data.token;
                localStorage.setItem("token", token);
                setStatus(true);
                updateUIForRole();
                await loadCategories();
                getProducts();
                showToast("Signed in successfully");
            } else {
                showToast("Invalid credentials", "error");
            }
        } catch (e) {
            showToast("Login failed", "error");
        }
    }

    // ── LOGOUT ────────────────────────────────────────────
    function logout() {
        localStorage.removeItem("token");
        token = "";
        allCategories = [];
        setStatus(false);
        document.getElementById("products").innerHTML =
            `<div class="empty-state"><span>📦</span>Sign in and load products to get started</div>`;
        document.getElementById("productCount").textContent = "0 items";
        document.getElementById("adminControls").style.display = "none";
        showToast("Signed out");
    }

    // ── CATEGORIES ────────────────────────────────────────
    async function loadCategories() {
        try {
            const res = await fetch(`${BASE_URL}/categories`, {
                headers: {"Authorization": "Bearer " + token}
            });
            if (!res.ok) return;
            allCategories = await res.json();

            const select = document.getElementById("categoryId");
            select.innerHTML = `<option value="">Select category...</option>`;
            allCategories.forEach(c => {
                const opt = document.createElement("option");
                opt.value = c.id;
                opt.textContent = c.name;
                select.appendChild(opt);
            });
        } catch (e) { /* silent */
        }
    }

    // ── GET PRODUCTS ──────────────────────────────────────
    async function getProducts(query = "") {
        const list = document.getElementById("products");
        list.innerHTML = `<div class="empty-state"><span>⏳</span>Loading products...</div>`;

        const url = query
            ? `${BASE_URL}/products?name=${encodeURIComponent(query)}`
            : `${BASE_URL}/products`;

        const res = await fetch(url, {
            headers: {"Authorization": "Bearer " + token}
        });

        if (res.status === 401 || res.status === 403) {
            logout();
            showToast("Session expired. Please sign in again.", "error");
            return;
        }

        const data = await res.json();
        renderProducts(data);
    }

    // ── SEARCH ────────────────────────────────────────────
    function handleSearch(val) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => getProducts(val.trim()), 350);
    }

    // ── RENDER PRODUCTS ───────────────────────────────────
    function renderProducts(data) {
        const list = document.getElementById("products");
        const role = getRoleFromToken();

        document.getElementById("productCount").textContent =
            `${data.length} item${data.length !== 1 ? "s" : ""}`;

        if (data.length === 0) {
            list.innerHTML = `<div class="empty-state"><span>📦</span>No products found</div>`;
            return;
        }

        list.innerHTML = "";
        data.forEach(p => {
            const li = document.createElement("li");
            li.className = "product-item";
            li.id = `product-${p.id}`;

            const adminButtons = role === "ROLE_ADMIN" ? `
                <button class="btn-warning" onclick="toggleEdit(${p.id})">Edit</button>
                <button class="btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
            ` : `<div></div><div></div>`;

            const categoryOptions = allCategories.map(c =>
                `<option value="${c.id}" ${c.id === p.categoryId ? "selected" : ""}>${c.name}</option>`
            ).join("");

            li.innerHTML = `
                <div class="product-row">
                    <div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-id">#${p.id}</div>
                    </div>
                    <span class="product-category">${p.categoryName || "Uncategorized"}</span>
                    <div class="product-meta product-price">${formatCurrency(p.price)}</div>
                    <div class="product-meta product-qty">Qty: ${p.quantity}</div>
                    ${adminButtons}
                </div>
                <div class="edit-panel" id="edit-${p.id}">
                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input id="edit-name-${p.id}" value="${p.name.replace(/"/g, '&quot;')}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Price</label>
                        <input id="edit-price-${p.id}" type="number" step="0.01" value="${p.price}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Quantity</label>
                        <input id="edit-qty-${p.id}" type="number" value="${p.quantity}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select id="edit-cat-${p.id}">${categoryOptions}</select>
                    </div>
                    <div style="display:flex;gap:0.5rem;">
                        <button class="btn-success" onclick="updateProduct(${p.id})">Save</button>
                        <button class="btn-secondary" style="padding:0.35rem 0.75rem;font-size:0.78rem;" onclick="toggleEdit(${p.id})">Cancel</button>
                    </div>
                </div>
            `;
            list.appendChild(li);
        });
    }

    // ── TOGGLE EDIT PANEL ─────────────────────────────────
    function toggleEdit(id) {
        document.getElementById(`edit-${id}`).classList.toggle("open");
    }

    // ── CREATE PRODUCT ────────────────────────────────────
    async function createProduct() {
        const catId = document.getElementById("categoryId").value;
        if (!catId) {
            showToast("Please select a category", "error");
            return;
        }

        const res = await fetch(`${BASE_URL}/products`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                name: document.getElementById("name").value,
                price: parseFloat(document.getElementById("price").value),
                quantity: parseInt(document.getElementById("quantity").value),
                categoryId: parseInt(catId)
            })
        });

        if (res.ok) {
            showToast("Product created");
            ["name", "price", "quantity"].forEach(id => document.getElementById(id).value = "");
            document.getElementById("categoryId").value = "";
            getProducts();
        } else {
            showToast("Failed to create product", "error");
        }
    }

    // ── UPDATE PRODUCT ────────────────────────────────────
    async function updateProduct(id) {
        const res = await fetch(`${BASE_URL}/products/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                name: document.getElementById(`edit-name-${id}`).value,
                price: parseFloat(document.getElementById(`edit-price-${id}`).value),
                quantity: parseInt(document.getElementById(`edit-qty-${id}`).value)
            })
        });

        if (res.ok) {
            showToast("Product updated");
            getProducts();
        } else {
            showToast("Update failed", "error");
        }
    }

    // ── DELETE PRODUCT ────────────────────────────────────
    async function deleteProduct(id) {
        if (!confirm("Delete this product?")) return;

        const res = await fetch(`${BASE_URL}/products/${id}`, {
            method: "DELETE",
            headers: {"Authorization": "Bearer " + token}
        });

        if (res.ok) {
            showToast("Product deleted");
            getProducts();
        } else {
            showToast("Delete failed", "error");
        }
    }

    // ── HELPERS ───────────────────────────────────────────
    function getRoleFromToken() {
        if (!token) return null;
        const payload = JSON.parse(atob(token.split('.')[1]));
        return payload.role;
    }

    function updateUIForRole() {
        const role = getRoleFromToken();
        document.getElementById("adminControls").style.display =
            role === "ROLE_ADMIN" ? "block" : "none";
    }
</script>

</body>
</html>
